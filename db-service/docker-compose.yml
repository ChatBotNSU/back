version: "3.9"
services:
  db:
    image: postgres:16
    container_name: db_postgres
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: db-service
    depends_on:
      - db
    env_file:
      - .env
    command: ["pdm", "run", "start"]

volumes:
  pg_data:
